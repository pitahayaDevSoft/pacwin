<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Industrial Hex-Frame (Base) -->
  <path d="M 100 10 L 180 55 L 180 145 L 100 190 L 20 145 L 20 55 Z" fill="#0D1017" stroke="#323845" stroke-width="2"/>

  <!-- Technical Grid Background (Subtle) -->
  <path d="M 20 100 H 180 M 100 10 V 190 M 60 33 L 140 167 M 140 33 L 60 167" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>

  <!-- The "P" Core (Constructed from 3 Manager Segments) -->
  <!-- Main Vertical Pillar (The Orchestrator) -->
  <rect x="65" y="50" width="22" height="100" fill="#FFFFFF"/>

  <!-- Top Segment (Winget - Blueish Tone represented via Neutral High Light) -->
  <path d="M 87 50 H 130 C 145 50 145 85 130 85 H 87 Z" fill="#E0E0E0"/>

  <!-- Center Accent (The Pitahaya Energy) -->
  <rect x="90" y="95" width="60" height="10" fill="#FF2400"/>

  <!-- Connection Detail -->
  <circle cx="76" cy="65" r="3" fill="#0D1017"/>
  <circle cx="76" cy="135" r="3" fill="#0D1017"/>

  <!-- Bottom Terminal Underscore -->
  <rect x="65" y="160" width="70" height="4" fill="#FF2400" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite" />
  </rect>

  <!-- Framing Brackets (Industrial feel) -->
  <path d="M 45 35 L 25 35 L 25 55" stroke="#FF2400" stroke-width="3" fill="none"/>
  <path d="M 155 165 L 175 165 L 175 145" stroke="#FF2400" stroke-width="3" fill="none"/>
</svg>
